<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f5f7fb" />
<meta name="format-detection" content="telephone=no,email=no,address=no" />
<title>时空卦四层十二宫排盘（离线版）</title>
<style>
   :root {
    --bg: #f5f1e8;
    --card: #f5f1e8;
    --line: #e5ded0;
    --line-strong: #ddd4c4;
    --text: #1f1f1f;
    --muted: #7d786f;
    --accent: #3f6ed8;
    --accent-soft: #eef3ff;
    --danger: #b53a3a;
    --shadow: none;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Noto Sans CJK SC", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    text-rendering: geometricPrecision;
  }
  body {
    min-height: 100vh;
    overscroll-behavior-x: none;
    touch-action: manipulation;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .app {
    max-width: 980px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
  }
  .stack {
    display: grid;
    gap: 14px;
    padding: 14px 0 28px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .section-head {
    padding: 14px 16px 0;
  }
  .section-title {
    font-size: 17px;
    font-weight: 700;
    margin: 0;
  }
  .section-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    line-height: 1.5;
  }
  .panel {
    padding: 14px 16px 16px;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .segmented {
    display: inline-flex;
    background: #eef2f8;
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
    flex-wrap: wrap;
  }
  .segmented button {
    border: 0;
    background: transparent;
    color: var(--muted);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 700;
    min-height: 40px;
  }
  .segmented button.active {
    background: #faf7ef;
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(31,75,204,.12);
  }
  .grid {
    display: grid;
    gap: 10px;
  }
  .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .field {
    display: grid;
    gap: 6px;
  }
  .field label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }
  .input, select, textarea, button {
    font: inherit;
  }
  .input, select, textarea {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #faf7ef;
    padding: 10px 12px;
    color: var(--text);
    outline: none;
  }
  .input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(31,75,204,.12);
  }
  textarea {
    min-height: 84px;
    resize: vertical;
  }
  .fieldset {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px;
    display: grid;
    gap: 10px;
    background: #f7f2e8;
  }
  .legend {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .row > * {
    flex: 1 1 0;
  }
  .btns {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .btn {
    min-height: 46px;
    padding: 0 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: #faf7ef;
    color: var(--text);
    font-weight: 700;
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn.soft {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: transparent;
  }
  .btn.danger {
    color: var(--danger);
  }
  .helper {
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted);
    margin-top: 10px;
  }
  .hide { display: none !important; }

  .plate-nav {
    display: flex;
    gap: 8px;
    padding: 12px 16px 4px;
    flex-wrap: wrap;
  }
  .plate-nav .btn {
    min-height: 40px;
    padding: 0 12px;
  }
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    padding: 0 16px 16px;
  }
  .summary-item {
    border: 1px solid var(--line);
    background: #f7f2e8;
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
  }
  .summary-k {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .summary-v {
    font-size: 16px;
    font-weight: 800;
  }

  .plate-wrap {
    padding: 8px 10px 14px;
    display: flex;
    justify-content: center;
  }
  .plate-shell {
    background: transparent;
    padding: 0;
    overflow: visible;
    border: 0;
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .plate {
    width: min(100%, 92vw, 620px);
    aspect-ratio: 1 / 1;
    position: relative;
    background: transparent;
    margin: 0 auto;
  }
  .ring-char {
    position: absolute;
    transform: translate3d(-50%, -50%, 0);
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 1.5em;
    min-height: 1.5em;
    line-height: 1;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0;
    user-select: none;
    white-space: nowrap;
    font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
    writing-mode: horizontal-tb;
    text-orientation: mixed;
    font-feature-settings: "palt" 0;
    -webkit-font-smoothing: antialiased;
    backface-visibility: hidden;
  }
  .ring-1 {
    color: #111111;
    font-size: clamp(18px, 3.5vw, 24px);
  }
  .ring-2 {
    color: #111111;
    font-size: clamp(18px, 3.5vw, 24px);
  }
  .ring-3 {
    color: #2f87ff;
    font-size: clamp(18px, 3.5vw, 24px);
  }
  .ring-4 {
    color: #5c4835;
    font-size: clamp(18px, 3.5vw, 24px);
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    padding: 0 10px 14px;
  }

  .result-text {
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    background: #f7f2e8;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
  }

  .history-list {
    display: grid;
    gap: 10px;
  }
  .history-item {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    background: #faf7ef;
  }
  .history-top {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 8px;
  }
  .history-title {
    font-weight: 800;
    font-size: 14px;
  }
  .history-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .history-note {
    margin: 8px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    background: #f7f2e8;
    padding: 8px 10px;
    border-radius: 12px;
  }
  .history-text {
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted);
    white-space: pre-wrap;
  }
  .history-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .empty {
    color: var(--muted);
    font-size: 13px;
    padding: 8px 0;
  }

  .spirit-guide {
    display: grid;
    gap: 10px;
  }
  .spirit-note {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.7;
    background: #f7f2e8;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .spirit-card {
    border: 1px solid var(--line);
    background: #faf7ef;
    border-radius: 15px;
    padding: 11px 12px;
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 10px;
    align-items: start;
  }
  .spirit-symbol {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 20px;
    font-weight: 900;
  }
  .spirit-name {
    font-size: 14px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .spirit-meaning {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
  }
  .spirit-tags {
    margin-top: 6px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .spirit-tag {
    font-size: 11px;
    color: var(--muted);
    background: #f7f2e8;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 7px;
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom) + 18px);
    transform: translateX(-50%) translateY(16px);
    background: rgba(18,32,51,.92);
    color: #fff;
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: .24s ease;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }


  /* 页面流程：启动只显示输入页，排盘时显示过渡页，完成后显示结果页 */
  body.state-input #plateCard,
  body.state-input #historyCard,
  body.state-input #transitionCard,
  body.state-loading #inputCard,
  body.state-loading #plateCard,
  body.state-loading #historyCard,
  body.state-result #inputCard,
  body.state-result #transitionCard {
    display: none !important;
  }
  body.state-loading #transitionCard,
  body.state-result #plateCard,
  body.state-result #historyCard {
    display: block;
  }

  body.state-loading #transitionCard.transition-card {
    display: grid;
  }
  .transition-card {
    min-height: calc(100vh - 28px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    display: grid;
    place-items: center;
    text-align: center;
    padding: 28px 18px;
  }
  .transition-inner {
    width: min(100%, 420px);
    display: grid;
    justify-items: center;
    gap: 16px;
  }
  .loading-orb {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    border: 1px solid rgba(63,110,216,.25);
    background: radial-gradient(circle at 35% 30%, #ffffff, #eef3ff 48%, rgba(63,110,216,.18));
    box-shadow: 0 16px 38px rgba(63,110,216,.16);
    position: relative;
    animation: orbPulse 1.15s ease-in-out infinite alternate;
  }
  .loading-orb::before,
  .loading-orb::after {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(63,110,216,.75);
    border-right-color: rgba(63,110,216,.18);
    animation: orbSpin 1s linear infinite;
  }
  .loading-orb::after {
    inset: 10px;
    border-top-color: rgba(92,72,53,.55);
    border-right-color: rgba(92,72,53,.12);
    animation-duration: 1.45s;
    animation-direction: reverse;
  }
  .transition-title {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: .04em;
  }
  .transition-sub {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }
  .transition-steps {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-top: 4px;
  }
  .transition-step {
    border: 1px solid var(--line);
    background: #faf7ef;
    border-radius: 14px;
    padding: 9px 6px;
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
  }
  @keyframes orbSpin { to { transform: rotate(360deg); } }
  @keyframes orbPulse { from { transform: scale(.96); } to { transform: scale(1.04); } }



  /* 丝滑结果页：主界面只保留盘面，文本/记录/备注全部弹层查看 */
  body.state-result {
    height: 100dvh;
    overflow: hidden;
  }
  body.state-result .app {
    height: 100dvh;
    max-width: 760px;
  }
  body.state-result .stack {
    height: 100%;
    padding: 8px 0;
    gap: 0;
  }
  body.state-result #plateCard {
    min-height: calc(100dvh - 16px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    display: flex !important;
    flex-direction: column;
  }
  body.state-result .section-head {
    padding-top: 10px;
  }
  body.state-result .section-sub {
    display: none;
  }
  body.state-result .plate-nav {
    padding: 10px 12px 4px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  body.state-result .summary-bar {
    padding: 6px 12px 4px;
  }
  body.state-result .summary-item {
    padding: 8px 6px;
  }
  body.state-result .summary-k {
    font-size: 10px;
  }
  body.state-result .summary-v {
    font-size: 15px;
  }
  body.state-result .plate-wrap {
    flex: 1 1 auto;
    min-height: 0;
    align-items: center;
    padding: 0 8px 4px;
  }
  body.state-result .plate-shell {
    align-items: center;
  }
  body.state-result .plate {
    width: min(94vw, 620px, calc(100dvh - 250px));
    max-width: 100%;
  }
  body.state-result .actions {
    padding: 6px 10px 12px;
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }
  body.state-result .actions .btn,
  body.state-result .plate-nav .btn {
    min-height: 42px;
    border-radius: 13px;
    font-size: 13px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 1200;
    background: rgba(31,31,31,.34);
    display: none;
    align-items: end;
    justify-content: center;
    padding: 16px 12px calc(16px + env(safe-area-inset-bottom));
    animation: modalFade .18s ease both;
  }
  .modal-backdrop.show {
    display: flex;
  }
  .sheet-modal {
    width: min(100%, 620px);
    max-height: min(82dvh, 760px);
    background: #f5f1e8;
    border: 1px solid var(--line-strong);
    border-radius: 22px;
    box-shadow: 0 22px 70px rgba(38,32,24,.22);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
    animation: sheetUp .22s ease both;
  }
  .sheet-head {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  .sheet-title {
    font-size: 16px;
    font-weight: 900;
  }
  .sheet-body {
    min-height: 0;
    overflow: auto;
    padding: 14px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .sheet-actions {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    background: #f5f1e8;
  }
  .sheet-actions.single {
    grid-template-columns: 1fr;
  }
  .sheet-actions.three {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .modal-text {
    max-height: none;
    min-height: 260px;
    font-size: 14px;
  }
  .modal-backdrop .btn {
    min-height: 42px;
  }
  .icon-close {
    width: 38px;
    height: 38px;
    min-height: 38px !important;
    padding: 0;
    border-radius: 50%;
    flex: 0 0 auto;
  }
  #historyModal .history-list {
    gap: 12px;
  }
  #historyModal .history-text {
    max-height: 150px;
    overflow: auto;
    background: #f7f2e8;
    border-radius: 12px;
    padding: 8px 10px;
  }
  #recordModal textarea {
    min-height: 120px;
  }
  @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(18px); opacity: .92; } to { transform: translateY(0); opacity: 1; } }


  /* 高级移动端选择器：替代原生 select/date/time 弹窗 */

  .lunar-date-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  @media (max-width: 520px) {
    .lunar-date-grid { grid-template-columns: 1fr; }
  }

  .native-select-hidden,
  .native-date-hidden {
    position: absolute !important;
    width: 1px !important;
    height: 1px !important;
    opacity: 0 !important;
    pointer-events: none !important;
    border: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  .picker-trigger,
  .date-part-btn,
  .mini-chip {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .picker-trigger {
    width: 100%;
    min-height: 48px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.54), rgba(255,255,255,.12)),
      #faf7ef;
    color: var(--text);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: 0 6px 18px rgba(45,35,20,.035);
  }
  .picker-trigger:active,
  .date-part-btn:active,
  .mini-chip:active {
    transform: scale(.985);
  }
  .picker-trigger:focus-visible,
  .date-part-btn:focus-visible,
  .mini-chip:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(63,110,216,.14);
  }
  .picker-value {
    font-size: 15px;
    font-weight: 850;
    letter-spacing: .02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .picker-meta {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    margin-top: 2px;
  }
  .picker-caret {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    flex: 0 0 auto;
    display: inline-grid;
    place-items: center;
    color: var(--accent);
    background: rgba(63,110,216,.09);
    font-size: 14px;
    font-weight: 900;
  }
  .picker-sheet {
    max-height: min(78dvh, 680px);
  }
  .picker-options {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 9px;
  }
  .picker-options.compact {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }
  .picker-options.wide {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .picker-options.single {
    grid-template-columns: 1fr;
  }
  .picker-option {
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.08)),
      #faf7ef;
    color: var(--text);
    font-size: 15px;
    font-weight: 850;
    padding: 0 8px;
  }
  .picker-option.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 10px 24px rgba(63,110,216,.22);
  }
  .picker-option:disabled {
    opacity: .35;
  }
  .picker-hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .smart-date-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }
  .smart-date-row.time-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .date-part-btn {
    min-height: 48px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.54), rgba(255,255,255,.12)),
      #faf7ef;
    color: var(--text);
    display: grid;
    place-items: center;
    padding: 8px 6px;
    box-shadow: 0 6px 18px rgba(45,35,20,.035);
  }
  .date-num {
    font-size: 16px;
    line-height: 1;
    font-weight: 900;

  function openValuePicker({ title, values, current, onPick, hint = "轻点选项即可完成选择", scrollToValue = null }) {
    ensureSmartPickerModal();
    smartPickerTitle.textContent = title || "请选择";
    smartPickerModal.querySelector("#smartPickerHint").textContent = hint;
    smartPickerBody.innerHTML = "";
    const sample = values.reduce((a, b) => String(a.label || a).length > String(b.label || b).length ? a : b, "");
    setPickerGridClass(values.length, String(sample.label || sample));
    values.forEach(item => {
      const value = item.value ?? item;
      const label = item.label ?? item;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "picker-option";
      btn.textContent = label;
      btn.dataset.value = String(value);
      btn.disabled = !!item.disabled;
      btn.classList.toggle("active", String(value) === String(current));
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        onPick(String(value), item);
        closeModal(smartPickerModal);
      });
      smartPickerBody.appendChild(btn);
    });
    openModal(smartPickerModal);

    const targetValue = scrollToValue == null ? current : scrollToValue;
    requestAnimationFrame(() => {
      const targetBtn = [...smartPickerBody.querySelectorAll(".picker-option")]
        .find(btn => btn.dataset.value === String(targetValue));
      if (targetBtn) targetBtn.scrollIntoView({ block: "center", inline: "nearest" });
    });
  }

  function lunarMonthLabel(month, isLeap = false) {
    return `${isLeap ? "闰" : ""}${LUNAR_MONTH_NAMES[month] || `${month}月`}`;
  }

  function lunarDayLabel(day) {
    return LUNAR_DAY_NAMES[day] || `${day}日`;
  }

  function makeLunarMonthOptions(year) {
    const y = Number(year) || 1900;
    const lm = leapMonth(y);
    const options = [];
    for (let m = 1; m <= 12; m++) {
      options.push({ value: String(m), label: lunarMonthLabel(m, false) });
      if (lm === m) options.push({ value: `L${m}`, label: lunarMonthLabel(m, true) });
    }
    return options;
  }

  function makeLunarDayOptions(maxDay = 30) {
    return Array.from({ length: maxDay }, (_, i) => ({
      value: String(i + 1),
      label: lunarDayLabel(i + 1)
    }));
  }

  function formatLunarMonthValue(month, isLeap = false) {
    return `${isLeap ? "L" : ""}${Number(month) || 1}`;
  }

  function parseLunarMonthSelection() {
    const raw = String(els.lunarMonth.value || "1");
    const isLeap = raw.startsWith("L");
    const month = Number(isLeap ? raw.slice(1) : raw) || 1;
    return { month, isLeap };
  }

  function getLunarMaxDay(year, month, isLeap = false) {
    return isLeap ? leapDays(year) : monthDays(year, month);
  }

  function parseDateParts(input) {
    const now = new Date();
    const raw = input.value || `${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`;
    const [y, m, d] = raw.split("-").map(Number);
    return {
      year: y || now.getFullYear(),
      month: m || now.getMonth() + 1,
      day: d || now.getDate()
    };
  }

  function daysInSolarMonth(year, month) {
    return new Date(year, month, 0).getDate();
  }

  function setSolarDatePart(part, value) {
    const p = parseDateParts(els.solarDate);
    p[part] = Number(value);
    const maxDay = daysInSolarMonth(p.year, p.month);
    p.day = Math.min(p.day, maxDay);
    els.solarDate.value = `${p.year}-${pad2(p.month)}-${pad2(p.day)}`;
    updateDateTrigger(els.solarDate);
  }

  function parseTimeParts(input) {
    const [h, m] = (input.value || "12:00").split(":").map(Number);
    return { hour: Number.isFinite(h) ? h : 12, minute: Number.isFinite(m) ? m : 0 };
  }

  function setTimePart(input, part, value) {
    const t = parseTimeParts(input);
    t[part] = Number(value);
    input.value = `${pad2(t.hour)}:${pad2(t.minute)}`;
    updateDateTrigger(input);

        })),

  function syncLunarControls() {
    if (!els.lunarYear || !els.lunarMonth || !els.lunarDay) return;
    const y = Number(els.lunarYear.value) || 1900;
    const previous = parseLunarMonthSelection();
    const monthOptions = makeLunarMonthOptions(y);
    const validValues = monthOptions.map(item => item.value);
    populateSelect(els.lunarMonth, monthOptions);

    let nextMonthValue = formatLunarMonthValue(previous.month, previous.isLeap && leapMonth(y) === previous.month);
    if (!validValues.includes(nextMonthValue)) nextMonthValue = String(Math.min(Math.max(previous.month || 1, 1), 12));
    els.lunarMonth.value = nextMonthValue;

    const selected = parseLunarMonthSelection();
    const maxDay = getLunarMaxDay(y, selected.month, selected.isLeap);
    const currentDay = Math.min(Number(els.lunarDay.value) || 1, maxDay);
    populateSelect(els.lunarDay, makeLunarDayOptions(maxDay));
    els.lunarDay.value = String(currentDay);

    updateAllPickerTriggers();
    updateLunarSolarPreview();
  }

  function updateLunarSolarPreview() {
    if (!els.lunarToSolarPreview || !els.lunarYear || !els.lunarMonth || !els.lunarDay) return;
    try {
      const y = Number(els.lunarYear.value);
      const { month, isLeap } = parseLunarMonthSelection();
      const d = Number(els.lunarDay.value);
      const [hh, mm] = (els.lunarTime.value || "12:00").split(":").map(Number);
      const solarDate = lunarToSolar(y, month, d, isLeap);
      solarDate.setHours(hh || 0, mm || 0, 0, 0);
      els.lunarToSolarPreview.value = `${solarDate.getFullYear()}-${pad2(solarDate.getMonth()+1)}-${pad2(solarDate.getDate())} ${pad2(solarDate.getHours())}:${pad2(solarDate.getMinutes())}`;

  function getSequenceFrom(start, source, len = 12) {
    const idx = source.indexOf(start);
    if (idx === -1) throw new Error(`序列中不存在：${start}`);
    return Array.from({length: len}, (_, i) => source[(idx + i) % source.length]);
  }

  function buildCycleFromStem(stem, len = 12) {
    const idx = STEMS.indexOf(stem);
    if (idx === -1) throw new Error(`无效日干：${stem}`);
    return Array.from({length: len}, (_, i) => STEMS[(idx + i) % STEMS.length]);
  }

  function placeByDirection(items, anchorIndex, direction) {
    const placed = Array(12).fill("");
    items.forEach((item, offset) => {
      const idx = mod(anchorIndex + direction * offset, 12);
      placed[idx] = item;
    });
    return placed;
  }

  function computeMonthGeneral(yearBranch, monthBranch, dayBranch, hourBranch) {
    const total = BRANCH_VALUE_MAIN[yearBranch] + BRANCH_VALUE_MAIN[monthBranch] + BRANCH_VALUE_MAIN[dayBranch] + BRANCH_VALUE_HOUR[hourBranch];
    const rem = total % 12 || 12;
    return {
      total,
      rem,
      branch: MONTH_GENERAL_MAP[rem],
      name: MONTH_GENERAL_NAME[MONTH_GENERAL_MAP[rem]]
    };
  }

  function getTimePhaseFromBranch(divinationBranch) {
    return DAY_NOBLE_BRANCHES.has(divinationBranch) ? "白天" : "晚上";
  }

  function computeNoble(dayStem, divinationBranch, nobleMode = "auto") {
    const pair = NOBLE_MAP[dayStem];
    if (!pair) throw new Error("日干贵人映射不存在");
    const timePhase = getTimePhaseFromBranch(divinationBranch);
    const resolvedMode = nobleMode === "auto"
      ? (timePhase === "白天" ? "yang" : "yin")
      : nobleMode;
    const nobleType = resolvedMode === "yang" ? "阳贵人" : "阴贵人";
    return {
      timePhase,
      nobleType,
      mode: resolvedMode,
      modeText: nobleMode === "auto" ? "默认（按占卜之时）" : `强制${nobleType}`,
      branch: resolvedMode === "yang" ? pair[0] : pair[1],
      pair,
      pairText: `阳贵人：${pair[0]} / 阴贵人：${pair[1]}`
    };
  }

  function calculatePlate(inputs) {
    const direction = inputs.gender === "男" ? 1 : -1;
    const anchorIndex = PALACES.indexOf(inputs.divinationBranch);
    if (anchorIndex === -1) throw new Error("占卜之时不在固定宫位中");
    const mg = computeMonthGeneral(inputs.yearBranch, inputs.monthBranch, inputs.dayBranch, inputs.hourBranch);
    const secondSeq = getSequenceFrom(mg.branch, BRANCHES, 12);
    const secondLayer = placeByDirection(secondSeq, anchorIndex, direction);

    const noble = computeNoble(inputs.dayStem, inputs.divinationBranch, inputs.nobleMode || "auto");
    const nobleAnchor = secondLayer.indexOf(noble.branch);
    const thirdLayer = placeByDirection(GENERALS, nobleAnchor, direction);

    // 第四层天干层：以日干起始，在第二层找到日支所在宫，再按男女顺逆排。
    const fourthSeq = buildCycleFromStem(inputs.dayStem, 12);
    const dayBranchAnchor = secondLayer.indexOf(inputs.dayBranch);
    const fourthLayer = placeByDirection(fourthSeq, dayBranchAnchor, direction);

    const cells = PALACES.map((palace, i) => ({
      palace,
      monthGeneralBranch: secondLayer[i],
      general: thirdLayer[i],
      stem: fourthLayer[i]
    }));

    return {
      inputs,
      direction,
      directionText: direction === 1 ? "男顺排" : "女逆排",
      monthGeneral: mg,
      noble,
      secondLayer,
      thirdLayer,
      fourthLayer,
      cells
    };
  }

  function renderPlate(result) {
    els.plateCanvas.innerHTML = "";

    const rect = els.plateCanvas.getBoundingClientRect();
    const size = Math.max(280, Math.min(rect.width || els.plateCanvas.clientWidth || window.innerWidth - 24, 620));
    const compact = size <= 380;
    const ultraCompact = size <= 335;

    const config = {
      topY: ultraCompact ? 34.4 : compact ? 34.0 : 33.4,
      rightX: ultraCompact ? 65.6 : compact ? 66.0 : 66.6,
      bottomY: ultraCompact ? 65.6 : compact ? 66.0 : 66.6,
      leftX: ultraCompact ? 34.4 : compact ? 34.0 : 33.4,
      topXs: ultraCompact ? [45.6, 50.0, 54.4] : compact ? [45.0, 50.0, 55.0] : [44.5, 50.0, 55.5],
      sideYs: ultraCompact ? [45.6, 50.0, 54.4] : compact ? [45.0, 50.0, 55.0] : [44.5, 50.0, 55.5],
      stepMonth: Math.round(size * (ultraCompact ? 0.060 : compact ? 0.064 : 0.068)),
      stepGeneral: Math.round(size * (ultraCompact ? 0.118 : compact ? 0.124 : 0.132)),
      stepStem: Math.round(size * (ultraCompact ? 0.176 : compact ? 0.186 : 0.198)),
      font1: Math.round(size * (ultraCompact ? 0.050 : compact ? 0.052 : 0.050)),
      font2: Math.round(size * (ultraCompact ? 0.050 : compact ? 0.052 : 0.050)),
      font3: Math.round(size * (ultraCompact ? 0.048 : compact ? 0.050 : 0.048)),
      font4: Math.round(size * (ultraCompact ? 0.048 : compact ? 0.049 : 0.047))
    };

    const slots = [
      { x: config.topXs[0], y: config.topY, dx: 0, dy: -1 },
      { x: config.topXs[1], y: config.topY, dx: 0, dy: -1 },
      { x: config.topXs[2], y: config.topY, dx: 0, dy: -1 },
      { x: config.rightX, y: config.sideYs[0], dx: 1, dy: 0 },
      { x: config.rightX, y: config.sideYs[1], dx: 1, dy: 0 },
      { x: config.rightX, y: config.sideYs[2], dx: 1, dy: 0 },
      { x: config.topXs[2], y: config.bottomY, dx: 0, dy: 1 },
      { x: config.topXs[1], y: config.bottomY, dx: 0, dy: 1 },
      { x: config.topXs[0], y: config.bottomY, dx: 0, dy: 1 },
      { x: config.leftX, y: config.sideYs[2], dx: -1, dy: 0 },
      { x: config.leftX, y: config.sideYs[1], dx: -1, dy: 0 },
      { x: config.leftX, y: config.sideYs[0], dx: -1, dy: 0 }
    ];

    const layers = [
      { className: "ring-1", distance: 0, fontSize: config.font1, values: result.cells.map(c => c.palace) },
      { className: "ring-2", distance: config.stepMonth, fontSize: config.font2, values: result.cells.map(c => c.monthGeneralBranch || "—") },
      { className: "ring-3", distance: config.stepGeneral, fontSize: config.font3, values: result.cells.map(c => c.general || "—") },
      { className: "ring-4", distance: config.stepStem, fontSize: config.font4, values: result.cells.map(c => c.stem || "—") }
    ];

    layers.forEach(layer => {
      layer.values.forEach((value, i) => {
        const slot = slots[i];
        const node = document.createElement("div");
        const box = Math.max(26, Math.round(layer.fontSize * 1.72));
        node.className = `ring-char ${layer.className}`;
        node.textContent = value;
        node.style.left = `calc(${slot.x}% + ${slot.dx * layer.distance}px)`;
        node.style.top = `calc(${slot.y}% + ${slot.dy * layer.distance}px)`;
        node.style.width = `${box}px`;
        node.style.height = `${box}px`;
        node.style.lineHeight = `${box}px`;
        node.style.fontSize = `${layer.fontSize}px`;
        els.plateCanvas.appendChild(node);
      });
    });

    els.summaryMonthGeneral.textContent = `${result.monthGeneral.branch}·${result.monthGeneral.name}`;
    els.summaryNoble.textContent = result.noble.branch;
    els.summaryDayNight.textContent = result.noble.timePhase;
    els.summaryDirection.textContent = result.direction === 1 ? "顺排" : "逆排";
  }

  function buildResultText(result) {
    const lines = [];

    lines.push(`性别：${p.gender}`);
    lines.push(`四柱：${p.yearStem}${p.yearBranch} / ${p.monthStem}${p.monthBranch} / ${p.dayStem}${p.dayBranch} / ${p.hourStem}${p.hourBranch}`);

    lines.push(`四支合数：${result.monthGeneral.total}，对12取余：${result.monthGeneral.rem}`);
    lines.push(`贵人模式：${result.noble.modeText}`);
    lines.push(`昼夜判定：${result.noble.timePhase}`);
    lines.push(`贵人候选：${result.noble.pairText}`);
    lines.push(`当前取用：${result.noble.nobleType}：${result.noble.branch}`);
    lines.push(`方向：${result.directionText}`);
    lines.push("");

      lines.push(`${cell.palace}宫｜月将地支：${cell.monthGeneralBranch}｜天将：${cell.general}｜天干：${cell.stem}`);
    });
    return lines.join("\n");
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = String(reader.result || "");
        resolve(result.includes(",") ? result.split(",")[1] : result);
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function lYearDays(y) {
    let sum = 348;
    for (let i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
    return sum + leapDays(y);
  }

  function leapDays(y) {
    if (leapMonth(y)) return (lunarInfo[y - 1899] & 0xf) === 0xf ? 30 : 29;
    return 0;
  }

  function leapMonth(y) {
    const lm = lunarInfo[y - 1900] & 0xf;
    return lm === 0xf ? 0 : lm;
  }

  function monthDays(y, m) {
    return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29;
  }

  function Lunar(objDate) {
    let i;
    let leap = 0;
    let temp = 0;
    let offset = (Date.UTC(objDate.getFullYear(), objDate.getMonth(), objDate.getDate()) - Date.UTC(1900, 0, 31)) / 86400000;
    for (i = 1900; i < 2101 && offset > 0; i++) {
      temp = lYearDays(i);
      offset -= temp;
    }
    if (offset < 0) {
      offset += temp;
      i--;
    }
    this.year = i;
    leap = leapMonth(i);
    this.isLeap = false;
    for (i = 1; i < 13 && offset > 0; i++) {
      if (leap > 0 && i === (leap + 1) && this.isLeap === false) {
        --i;
        this.isLeap = true;
        temp = leapDays(this.year);
      } else {
        temp = monthDays(this.year, i);
      }
      if (this.isLeap === true && i === (leap + 1)) this.isLeap = false;
      offset -= temp;
    }
    if (offset === 0 && leap > 0 && i === leap + 1) {
      if (this.isLeap) this.isLeap = false;
      else {
        this.isLeap = true;
        --i;
      }
    }
    if (offset < 0) {
      offset += temp;
      --i;
    }
    this.month = i;
    this.day = offset + 1;
  }

  function cyclical(num) {
    return STEMS[num % 10] + BRANCHES[num % 12];
  }

  function sTerm(y, n) {
    return solarTermBase[n] + Math.floor(Number(solarTermOS.charAt((solarTermIdx.charCodeAt(y - 1900) - 48) * 24 + n)));
  }

  function getSolarGanzhi(date) {
    const y = date.getFullYear();
    const m = date.getMonth();
    const d = date.getDate();

    let cY = m < 2 ? cyclical(y - 1900 + 35) : cyclical(y - 1900 + 36);
    const term2 = sTerm(y, 2);
    if (m === 1 && d >= term2) cY = cyclical(y - 1900 + 36);

    const firstNode = sTerm(y, m * 2);
    let cM = cyclical((y - 1900) * 12 + m + 12);
    if (d >= firstNode) cM = cyclical((y - 1900) * 12 + m + 13);

    const dayCyclical = Date.UTC(y, m, d, 0, 0, 0, 0) / 86400000 + 25567 + 10;
    const cD = cyclical(dayCyclical);

    return { year: cY, month: cM, day: cD };
  }

  function getHourBranchFrom24(hour) {
    if (hour === 23 || hour === 0) return "子";
    if (hour === 1 || hour === 2) return "丑";
    if (hour === 3 || hour === 4) return "寅";
    if (hour === 5 || hour === 6) return "卯";
    if (hour === 7 || hour === 8) return "辰";
    if (hour === 9 || hour === 10) return "巳";
    if (hour === 11 || hour === 12) return "午";
    if (hour === 13 || hour === 14) return "未";
    if (hour === 15 || hour === 16) return "申";
    if (hour === 17 || hour === 18) return "酉";
    if (hour === 19 || hour === 20) return "戌";
    return "亥";
  }

  function getHourStem(dayStem, hourBranch) {
    const base = {
      "甲":0,"己":0,
      "乙":2,"庚":2,
      "丙":4,"辛":4,
      "丁":6,"壬":6,
      "戊":8,"癸":8
    }[dayStem];
    const hourIndex = BRANCHES.indexOf(hourBranch);
    return STEMS[(base + hourIndex) % 10];
  }

  function parseDateTime(dateStr, timeStr) {
    if (!dateStr) throw new Error("请先选择日期");
    const [y,m,d] = dateStr.split("-").map(Number);
    const [hh,mm] = (timeStr || "12:00").split(":").map(Number);
    return new Date(y, m - 1, d, hh || 0, mm || 0, 0, 0);
  }

  function convertSolarToPillars(date, gender, divinationBranch, nobleMode = "auto") {
    const lunar = new Lunar(date);
    const gz = getSolarGanzhi(date);
    const hourBranch = getHourBranchFrom24(date.getHours());
    const hourStem = getHourStem(gz.day[0], hourBranch);
    return {
      gender,
      divinationBranch,
      nobleMode,
      yearStem: gz.year[0],
      yearBranch: gz.year[1],
      monthStem: gz.month[0],
      monthBranch: gz.month[1],
      dayStem: gz.day[0],
      dayBranch: gz.day[1],
      hourStem,
      hourBranch,
      solarText: `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())} ${pad2(date.getHours())}:${pad2(date.getMinutes())}`,
      lunarText: `农历${lunar.year}年${lunar.isLeap ? "闰" : ""}${lunar.month}月${lunar.day}日`
    };
  }

  function lunarToSolar(y, m, d, isLeap) {
    if (y < 1900 || y > 2100) throw new Error("农历年份仅支持 1900-2100");
    const lm = leapMonth(y);
    if (isLeap && lm !== m) throw new Error(`该年无闰${m}月`);
    const max = isLeap ? leapDays(y) : monthDays(y, m);
    if (d < 1 || d > max) throw new Error(`该农历日期超出范围，最大为${max}日`);

    let offset = 0;
    for (let i = 1900; i < y; i++) offset += lYearDays(i);
    for (let i = 1; i < m; i++) {
      offset += monthDays(y, i);
      if (lm && i === lm) offset += leapDays(y);
    }
    if (isLeap) offset += monthDays(y, m);
    offset += d - 1;

    const base = Date.UTC(1900, 0, 31);
    const res = new Date(base + offset * 86400000);
    return new Date(res.getUTCFullYear(), res.getUTCMonth(), res.getUTCDate(), 0, 0, 0, 0);
  }

  function drawRoundRect(ctx, x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
  }

  async function downloadPngBlob(blob, filename) {
    if (hasAndroidBridge()) {
      try {
        const base64 = await blobToBase64(blob);
        const ok = callAndroid("saveBase64File", filename, base64, "image/png");
        if (ok !== false) return true;
      } catch (err) {
        console.warn(err);
      }
    }

    if (typeof File !== "undefined" && navigator.canShare && navigator.share) {
      const file = new File([blob], filename, { type: "image/png" });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: "时空卦排盘图片" });
          return true;
        } catch (err) {
          if (err && err.name === "AbortError") return false;
        }
      }
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    return true;
  }

      const slots = [

        { x: 33.4, y: 50.0, dx: -1, dy: 0 },
        { x: 33.4, y: 44.5, dx: -1, dy: 0 }
      ];
      const layers = [

        layer.values.forEach((value, i) => {

          const y = plateY + plateSize * slot.y / 100 + slot.dy * layer.distance;

      el.addEventListener("change", syncLunarControls);
    });
    els.lunarDay.addEventListener("change", updateLunarSolarPreview);
    els.lunarTime.addEventListener("change", updateLunarSolarPreview);
    [
      [els.yearStem, els.yearBranch],
      [els.monthStem, els.monthBranch],
      [els.dayStem, els.dayBranch],
      [els.hourStem, els.hourBranch]
    ].forEach(([stemEl, branchEl]) => {
      stemEl.addEventListener("change", () => syncManualBranchOptions(stemEl, branchEl));
    });
    els.openTextBtn.addEventListener("click", openResultText);
    els.spiritGuideBtn.addEventListener("click", openSpiritGuide);
    els.closeSpiritModalBtn.addEventListener("click", () => closeModal(els.spiritModal));
    els.closeSpiritModalBtn2.addEventListener("click", () => closeModal(els.spiritModal));
    els.copyTextInModalBtn.addEventListener("click", copyText);
    els.closeTextModalBtn.addEventListener("click", () => closeModal(els.textModal));
    els.closeTextModalBtn2.addEventListener("click", () => closeModal(els.textModal));
    els.imageBtn.addEventListener("click", savePlateImage);
    els.saveRecordBtn.addEventListener("click", openRecordModal);
    els.saveRecordConfirmBtn.addEventListener("click", saveCurrentRecord);
    els.closeRecordModalBtn.addEventListener("click", () => closeModal(els.recordModal));
    els.closeRecordModalBtn2.addEventListener("click", () => closeModal(els.recordModal));
    els.closeHistoryModalBtn.addEventListener("click", () => closeModal(els.historyModal));
    els.closeHistoryModalBtn2.addEventListener("click", () => closeModal(els.historyModal));
    els.clearHistoryBtn.addEventListener("click", clearHistory);
    els.exportHistoryBtn.addEventListener("click", exportHistoryText);
    [els.textModal, els.spiritModal, els.recordModal, els.historyModal].forEach(modal => {
      modal.addEventListener("click", e => {
        if (e.target === modal) closeModal(modal);
      });
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeAllModals();
    });
    els.historyList.addEventListener("click", e => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.action === "delete") deleteHistoryItem(id);
      if (btn.dataset.action === "copy") copyHistoryText(id);
    });
  }

  buildOptions();
  initDefaults();
  setupEnhancedInputs();
  bindEvents();
  markAppEnv();
  renderEmptyPlate();
  renderHistory();
  goToInput();

  window.addEventListener("resize", () => {
    if (latestResult) renderPlate(latestResult);
    else renderEmptyPlate();
  });
  window.addEventListener("orientationchange", () => {
    setTimeout(() => {
      if (latestResult) renderPlate(latestResult);
      else renderEmptyPlate();
    }, 120);
  });
})();
</script>
</body>
</html>
